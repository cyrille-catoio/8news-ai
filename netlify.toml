[build]
  # Tests run first: a red unit test blocks the deploy (~2 s overhead).
  command = "npm test && npm run build"
  publish = ".next"

[functions]
  directory = "netlify/functions"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[redirects]]
  from = "https://8news.netlify.app/*"
  to = "https://8news.ai/:splat"
  status = 301
  force = true
